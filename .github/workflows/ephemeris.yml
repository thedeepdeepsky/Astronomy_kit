name: Daily Ephemeris Data Generation

on:
  schedule:
    - cron: '0 0 * * *'  # Runs at midnight UTC every day

jobs:
  generate_ephemeris:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install skyfield numpy

    - name: Generate Ephemeris Data
      run: |
        python scripts/generate_ephemeris.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "Daily ephemeris data update - sunrise and sunset" || echo "No changes to commit"
        git push
